<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonglade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header">
        <div class="h-left">
            <h1>Moonglade Poetry</h1>
        </div>
        <div class="h-right">
            <ul>
                <li>About</li>
                <li>Past Issues</li>
                <li>Contributors</li>
            </ul>
        </div>
    </div>

    <div class="description">
        <div class="d-left">
            <h2>Who are we?</h2>
            <p class="about"><em>Moonglade Poetry</em> is a queer, gothic poetry collective centred around the major arcana tarot cards.</p>
            <button>Submit!</button>
        </div>
        <div class="d-right">
            <img src="images/moonglade-logo.PNG" alt="An arch with a moon and shimmer on water inside, with text reading Moonglade Poetry next to it.">
        </div>
    </div>

    <div class="middle-content"></div>

    <div class="quote"></div>

    <div class="contact-info"></div>

    <div class="footer"></div>
    
</body>
</html>
